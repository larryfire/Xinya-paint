version: "3.8"

services:
  app:
    build: .
    container_name: xinya-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-file:/data/prod.db}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET 必须设置}
      NODE_ENV: production
    volumes:
      - app_data:/data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/auth/me"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  app_data:
