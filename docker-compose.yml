version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: xinya-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: xinya_root_2024
      MYSQL_DATABASE: xinya_paint
      MYSQL_USER: xinya
      MYSQL_PASSWORD: xinya_pwd_2024
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: xinya-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: mysql://xinya:xinya_pwd_2024@mysql:3306/xinya_paint
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_USER: xinya
      DB_PASSWORD: xinya_pwd_2024
      DB_NAME: xinya_paint
      JWT_SECRET: change-this-to-a-random-secret-in-production
      NODE_ENV: production
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
